name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'aws-gitops-platform-staging' }}
  ECS_CONTAINER_NAME: ${{ vars.ECS_CONTAINER_NAME || 'app' }}

jobs:
  build-and-push:
    name: Build and push release image
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC (staging)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN_STAGING || vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cd-build
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$ECR_REPOSITORY" --image-scanning-configuration scanOnPush=true --region "$AWS_REGION"

      - name: Build and push image
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          IMAGE_URI="$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -t "$IMAGE_URI" ./app
          docker push "$IMAGE_URI"
          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

  deploy-staging:
    name: Deploy to staging ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging

    steps:
      - name: Configure AWS credentials via OIDC (staging)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN_STAGING || vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cd-staging
          aws-region: ${{ env.AWS_REGION }}

      - name: Render and register new task definition
        id: taskdef
        env:
          CLUSTER_NAME: ${{ vars.ECS_CLUSTER_STAGING }}
          SERVICE_NAME: ${{ vars.ECS_SERVICE_STAGING }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)" \
            --query 'taskDefinition' > taskdef.json

          cat taskdef.json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            | jq --arg IMAGE "$IMAGE_URI" --arg NAME "$ECS_CONTAINER_NAME" '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end)' \
            > taskdef-updated.json

          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef-updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_arn=$NEW_TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Update staging service
        env:
          CLUSTER_NAME: ${{ vars.ECS_CLUSTER_STAGING }}
          SERVICE_NAME: ${{ vars.ECS_SERVICE_STAGING }}
          TASK_ARN: ${{ steps.taskdef.outputs.task_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$TASK_ARN" \
            --force-new-deployment

          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"

  deploy-production:
    name: Deploy to production ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    environment:
      name: production

    steps:
      - name: Configure AWS credentials via OIDC (production)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_GITHUB_OIDC_ROLE_ARN_PRODUCTION || vars.AWS_GITHUB_OIDC_ROLE_ARN }}
          role-session-name: github-actions-cd-production
          aws-region: ${{ env.AWS_REGION }}

      - name: Render and register new task definition
        id: taskdef
        env:
          CLUSTER_NAME: ${{ vars.ECS_CLUSTER_PRODUCTION }}
          SERVICE_NAME: ${{ vars.ECS_SERVICE_PRODUCTION }}
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "$(aws ecs describe-services --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME" --query 'services[0].taskDefinition' --output text)" \
            --query 'taskDefinition' > taskdef.json

          cat taskdef.json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            | jq --arg IMAGE "$IMAGE_URI" --arg NAME "$ECS_CONTAINER_NAME" '.containerDefinitions |= map(if .name == $NAME then .image = $IMAGE else . end)' \
            > taskdef-updated.json

          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://taskdef-updated.json --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "task_arn=$NEW_TASK_ARN" >> "$GITHUB_OUTPUT"

      - name: Update production service
        env:
          CLUSTER_NAME: ${{ vars.ECS_CLUSTER_PRODUCTION }}
          SERVICE_NAME: ${{ vars.ECS_SERVICE_PRODUCTION }}
          TASK_ARN: ${{ steps.taskdef.outputs.task_arn }}
        run: |
          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "$TASK_ARN" \
            --force-new-deployment

          aws ecs wait services-stable --cluster "$CLUSTER_NAME" --services "$SERVICE_NAME"
